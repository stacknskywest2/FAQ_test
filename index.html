<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAQ 업데이트 알림 기능 적용 예시</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0b5f9e">
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f4f7fb;color:#102033}
    main{max-width:720px;margin:0 auto;padding:32px 18px}
    .card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{font-size:24px;margin:0 0 12px;color:#0b5f9e}
    p{line-height:1.7}
    code{background:#eef4f9;border-radius:8px;padding:2px 6px}
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>FAQ 업데이트 알림 기능 적용 예시</h1>
      <p>이 파일은 적용 예시입니다. 실제 배포용 <code>faq_publish.html</code>의 <code>&lt;head&gt;</code>에 manifest 링크를 넣고, <code>&lt;/body&gt;</code> 직전에 update-notifier.js를 연결하면 됩니다.</p>
      <p>GitHub에 새 파일을 올리면 GitHub Actions가 <code>version.json</code>을 자동 갱신하고, 기존 설치 사용자는 다음 접속 또는 사용 중 주기 확인 시 업데이트 알림을 받습니다.</p>
    </section>
  </main>
  <script src="./update-notifier.js"></script>
</body>
</html>
