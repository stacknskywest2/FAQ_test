@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap');
:root{--keco-blue:#005f9b;--keco-sky:#1ba1c8;--keco-green:#73be1e;--keco-bg:#b2c7d9;--keco-purple:#3c1e6e;--kakao:#fae100;--text:#1d1d1f;--muted:rgba(0,0,0,.58);--card:#fff;--line:rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif}html,body{height:100%}body{min-height:100vh;background:linear-gradient(145deg,#eef8fb 0%,#d9eef3 35%,#b2c7d9 100%);color:var(--text);display:flex;justify-content:center;align-items:center;padding:20px;overflow:auto}.phone{width:100%;max-width:430px;height:min(780px,calc(100vh - 40px));background:var(--keco-bg);border-radius:18px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.2);display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.08)}header{background:linear-gradient(135deg,var(--keco-blue),var(--keco-purple));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}.avatar{width:42px;height:42px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--keco-blue);font-size:12px;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.12)}.head-title{min-width:0;flex:1}.head-title h1{font-size:15px;line-height:1.25;font-weight:800;letter-spacing:-.02em}.head-title p{font-size:10.5px;color:rgba(255,255,255,.75);margin-top:3px}.badge{font-size:10px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.16);white-space:nowrap}.chat{position:relative;flex:1;overflow:auto;padding:12px;scroll-behavior:smooth}.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:54px;font-weight:800;color:rgba(255,255,255,.16);pointer-events:none;user-select:none;white-space:nowrap}.date-divider{text-align:center;margin:2px 0 10px;position:relative;z-index:1}.date-divider span{background:rgba(0,0,0,.22);color:#fff;font-size:10.5px;padding:4px 10px;border-radius:999px}.pinned{position:sticky;top:-12px;z-index:5;margin:-12px -12px 8px;padding:12px;background:linear-gradient(to bottom,rgba(178,199,217,.98),rgba(178,199,217,.92),rgba(178,199,217,0));backdrop-filter:blur(4px)}.welcome-card{background:rgba(255,255,255,.9);border-radius:18px;padding:14px;box-shadow:0 4px 14px rgba(0,0,0,.08);border:1px solid rgba(255,255,255,.72)}.welcome-card h2{font-size:15px;margin-bottom:6px;letter-spacing:-.03em}.welcome-card p{font-size:12.5px;line-height:1.65;color:rgba(0,0,0,.68)}.searchbox{display:flex;gap:7px;margin-top:10px}.searchbox input{flex:1;border:1px solid #d6dbe2;border-radius:18px;background:#fff;padding:8px 12px;font-size:13px;outline:none}.searchbox input:focus{border-color:var(--keco-blue)}.searchbox button,.small-btn{border:0;border-radius:18px;background:var(--keco-blue);color:#fff;font-weight:700;font-size:12px;padding:8px 12px;cursor:pointer;white-space:nowrap}.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.quick button{background:#fff;border:1.5px solid rgba(0,95,155,.28);color:#0b4f78;border-radius:16px;min-height:48px;padding:9px 10px;font-size:12.5px;font-weight:800;line-height:1.35;cursor:pointer;transition:.15s;text-align:left}.quick button:hover{background:#f0faff;border-color:var(--keco-blue)}.quick button.disabled{background:#edf0f2;color:#8a9299;border-color:#d1d7dc;cursor:not-allowed}.quick button.disabled::after{content:'추후 업데이트';display:block;font-size:10px;font-weight:700;margin-top:3px;color:#9aa2a8}.nav-row{display:flex;gap:6px;margin:8px 0;position:relative;z-index:1}.nav-row button{background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:6px 10px;font-size:11.5px;font-weight:700;color:#345;cursor:pointer}.bubble-wrap{display:flex;gap:6px;margin:8px 0;position:relative;z-index:1;align-items:flex-start;animation:fadeUp .18s ease}.bubble-wrap.user{justify-content:flex-end}.bot-face{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--keco-blue);font-size:11px;font-weight:800;flex-shrink:0}.bubble-row{max-width:86%;display:flex;gap:6px;align-items:flex-end}.bubble{padding:10px 14px;border-radius:4px 16px 16px 16px;background:#fff;font-size:14px;line-height:1.62;box-shadow:none;word-break:keep-all;overflow-wrap:anywhere}.user .bubble{background:var(--kakao);border-radius:16px 4px 16px 16px}.time{font-size:10px;color:rgba(0,0,0,.42);white-space:nowrap;margin-bottom:2px}.bot .time{color:rgba(255,255,255,.78)}.card-list{display:grid;gap:8px}.item-card{background:#f8fbfe;border:1px solid rgba(0,95,155,.1);border-radius:14px;padding:10px 11px;cursor:pointer}.item-card:hover{background:#eef8ff}.item-card .k{font-size:11px;font-weight:800;color:var(--keco-blue);margin-bottom:4px}.item-card .q{font-size:13px;font-weight:700;line-height:1.45}.answer h3{font-size:13px;color:var(--keco-blue);margin:10px 0 4px}.answer h3:first-child{margin-top:0}.answer p{margin-bottom:8px}.answer ul{padding-left:17px;margin:4px 0 8px}.answer li{margin-bottom:3px}.mini-tag{display:inline-block;margin-bottom:7px;padding:3px 8px;border-radius:999px;background:#eef7ff;color:var(--keco-blue);font-size:11px;font-weight:800}.collapse-box{margin-top:9px;border-top:1px dashed rgba(0,0,0,.14);padding-top:8px}.collapse-box summary{cursor:pointer;list-style:none;font-size:12px;color:var(--keco-blue);font-weight:800}.collapse-box summary::-webkit-details-marker{display:none}.collapse-box summary:before{content:'▸';display:inline-block;margin-right:6px;transition:.15s}.collapse-box[open] summary:before{transform:rotate(90deg)}.collapse-content{font-size:12.5px;color:rgba(0,0,0,.72);line-height:1.6;margin-top:8px}.result-panel{margin-top:9px;background:rgba(255,255,255,.78);border-radius:14px;padding:9px;border:1px solid rgba(0,0,0,.06)}.result-panel summary{font-size:12px;font-weight:800;color:#334;cursor:pointer}.empty{font-size:12.5px;color:rgba(0,0,0,.66);line-height:1.6;padding:8px 0}.install-btn{border:0;border-radius:999px;background:rgba(255,255,255,.92);color:#005f9b;font-size:11px;font-weight:800;padding:7px 10px;cursor:pointer;white-space:nowrap}.install-btn:hover{background:#fff}.install-btn.hidden{display:none}.install-guide{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);width:min(394px,calc(100vw - 24px));background:#fff;border:1px solid rgba(0,95,155,.16);border-radius:18px;box-shadow:0 12px 32px rgba(0,0,0,.22);padding:14px;z-index:80;display:none}.install-guide.show{display:block}.install-guide h3{font-size:14px;color:#005f9b;margin-bottom:6px}.install-guide p,.install-guide li{font-size:12.5px;line-height:1.55;color:rgba(0,0,0,.72)}.install-guide ol{padding-left:18px;margin:8px 0}.install-guide .guide-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:10px}.install-guide button{border:0;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;cursor:pointer}.install-guide .primary{background:#005f9b;color:#fff}.install-guide .ghost{background:#eef4f8;color:#345}.footer{background:#fff;border-top:1px solid #ddd;padding:10px 12px;flex-shrink:0}.footer p{font-size:10.5px;color:rgba(0,0,0,.45);line-height:1.45;text-align:center}@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){body{padding:0}.phone{height:100vh;max-width:none;border-radius:0;border:0;box-shadow:none}header{border-radius:0}.quick{grid-template-columns:1fr 1fr}.bubble-row{max-width:88%}}
</style>

<main class="chat" id="chat"><div class="watermark">K-eco</div><div class="date-divider"><span id="todayLabel">오늘</span></div><section class="pinned"><div class="welcome-card"><h2>필요한 업무를 선택해 주세요</h2><p>검색하거나 아래 카테고리를 선택하면 관련 FAQ를 말풍선 형태로 안내합니다.</p><div class="searchbox"><input id="searchInput" type="search" placeholder="예: 개선계획서, 할당, 상태표시" autocomplete="off"/><button onclick="searchFaq()">검색</button></div><div id="searchResults"></div><div class="quick" id="categoryButtons"></div></div></section><div id="messages"></div></main>
<footer class="footer"><p>본 안내는 등록된 FAQ DB 기준의 1차 안내이며, 최신 법령·개별 사실관계에 따라 달라질 수 있습니다.</p></footer>
</div>
<div id="installGuide" class="install-guide" role="dialog" aria-live="polite" aria-label="앱으로 저장 안내">
  <h3>홈 화면에 앱처럼 저장하기</h3>
  <p id="installGuideText">브라우저 메뉴에서 홈 화면에 추가를 선택하면 앱처럼 실행할 수 있습니다.</p>
  <ol id="installGuideSteps"></ol>
  <div class="guide-actions"><button class="ghost" onclick="closeInstallGuide()">닫기</button><button class="primary" onclick="tryNativeInstall()">설치 시도</button></div>
</div>
<script>
// PWA 설치 기능: HTTPS 환경(GitHub Pages 포함)에서 앱처럼 홈 화면에 추가할 수 있도록 manifest를 동적으로 연결합니다.
const PWA_ICON_SVG = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#005f9b"/><stop offset="0.55" stop-color="#1ba1c8"/><stop offset="1" stop-color="#73be1e"/></linearGradient></defs><rect width="512" height="512" rx="112" fill="url(#g)"/><circle cx="256" cy="256" r="156" fill="rgba(255,255,255,.92)"/><path d="M168 268c38-82 111-123 210-124-12 117-74 190-185 219 11-31 34-70 73-116-39 21-72 48-98 81-13-19-13-39 0-60z" fill="#005f9b"/><text x="256" y="426" text-anchor="middle" font-family="Arial,sans-serif" font-size="48" font-weight="700" fill="white">FAQ</text></svg>`)}`;
let deferredInstallPrompt = null;
function setupPwaManifest(){
  try{
    const manifest = {name:'수도권관제센터 FAQ 안내', short_name:'수도권 FAQ', description:'수도권관제센터 FAQ 안내 서비스', start_url: location.href.split('#')[0], scope:'./', display:'standalone', background_color:'#b2c7d9', theme_color:'#005f9b', icons:[{src:PWA_ICON_SVG, sizes:'any', type:'image/svg+xml', purpose:'any maskable'}]};
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link'); link.rel='manifest'; link.href=url; document.head.appendChild(link);
    const apple = document.createElement('link'); apple.rel='apple-touch-icon'; apple.href=PWA_ICON_SVG; document.head.appendChild(apple);
  }catch(e){ console.warn('PWA manifest setup failed', e); }
}
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true}
window.addEventListener('beforeinstallprompt', (e)=>{e.preventDefault(); deferredInstallPrompt=e; const b=document.getElementById('installAppBtn'); if(b && !isStandalone()) b.classList.remove('hidden');});
window.addEventListener('appinstalled', ()=>{deferredInstallPrompt=null; const b=document.getElementById('installAppBtn'); if(b) b.classList.add('hidden'); closeInstallGuide();});
function installApp(){ if(deferredInstallPrompt){ tryNativeInstall(); return; } showInstallGuide(); }
async function tryNativeInstall(){ if(deferredInstallPrompt){ const p=deferredInstallPrompt; deferredInstallPrompt=null; await p.prompt(); await p.userChoice; return; } showInstallGuide(); }
function showInstallGuide(){
  const ua=navigator.userAgent||''; const isIOS=/iphone|ipad|ipod/i.test(ua); const isAndroid=/android/i.test(ua); const guide=document.getElementById('installGuide'); const text=document.getElementById('installGuideText'); const steps=document.getElementById('installGuideSteps');
  if(isIOS){ text.textContent='아이폰·아이패드는 Safari에서 공유 버튼을 눌러 홈 화면에 추가할 수 있습니다.'; steps.innerHTML='<li>Safari로 이 페이지를 엽니다.</li><li>하단 공유 버튼을 누릅니다.</li><li>홈 화면에 추가를 선택합니다.</li><li>추가를 누르면 앱 아이콘처럼 저장됩니다.</li>'; }
  else if(isAndroid){ text.textContent='안드로이드 Chrome에서는 메뉴에서 앱 설치 또는 홈 화면에 추가를 선택할 수 있습니다.'; steps.innerHTML='<li>Chrome으로 이 페이지를 엽니다.</li><li>오른쪽 위 메뉴 ⋮ 를 누릅니다.</li><li>앱 설치 또는 홈 화면에 추가를 선택합니다.</li><li>설치를 누르면 앱처럼 실행됩니다.</li>'; }
  else { text.textContent='PC 브라우저에서는 주소창 오른쪽의 설치 아이콘 또는 브라우저 메뉴의 앱 설치를 사용할 수 있습니다.'; steps.innerHTML='<li>Chrome 또는 Edge로 이 페이지를 엽니다.</li><li>주소창 오른쪽 설치 아이콘을 누릅니다.</li><li>설치를 선택합니다.</li>'; }
  guide.classList.add('show');
}
function closeInstallGuide(){ const guide=document.getElementById('installGuide'); if(guide) guide.classList.remove('show'); }
setupPwaManifest();
// v10 호환 데이터 주입부: 기존 v10의 FAQ_DATA 또는 faqData가 있으면 자동 사용합니다.
const EMBEDDED_FAQ_DATA = [];
const CATEGORY_ORDER = ['사업장 대기오염물질 총량관리','굴뚝 원격감시체계','사업장대기오염물질관리시스템 메뉴찾기','환경오염시설의 통합관리','양식업무편람다운로드','이용안내'];
const DISABLED_CATEGORIES = new Set(['양식업무편람다운로드','양식, 업무편람 다운로드','양식·업무편람 다운로드','이용안내']);
const SAMPLE_FAQ_DATA = [
{ id:'sample_1', category:'사업장 대기오염물질 총량관리', question:'총량관리사업장 관련 FAQ DB를 연결하면 어떻게 보이나요?', answer_direct:'v10의 기존 JSON 데이터를 이 위치에 내장하면 같은 화면 구조로 표시됩니다.', criteria:'카테고리, 질문, 답변 필드를 우선 인식하고, 세부 필드는 있으면 접기 영역에 표시합니다.', caution:'현재 파일은 v10 원본 파일 미제공 상태에서 만든 디자인 이식 베타입니다.', next_action:'v10 원본 HTML과 최종 JSON 또는 엑셀 마스터를 주시면 실제 데이터 기준으로 재생성합니다.'},
{ id:'sample_2', category:'굴뚝 원격감시체계', question:'검색결과를 접을 수 있나요?', answer_direct:'네. 검색 후 결과 영역은 접기/펼치기 방식으로 표시되며, 처음으로 버튼을 누르면 초기화면으로 돌아갑니다.', criteria:'검색어는 질문, 답변, 카테고리, 근거문서 필드를 함께 대상으로 합니다.', caution:'기존 v10 스크립트와 병합 시 함수명 충돌만 제거하면 됩니다.', next_action:'실제 v10 파일을 기준으로 병합 테스트를 수행합니다.'}
];
function getData(){ const d = window.FAQ_DATA || window.faqData || EMBEDDED_FAQ_DATA; return Array.isArray(d) && d.length ? d : SAMPLE_FAQ_DATA; }
function esc(s){return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function normalize(s){return String(s ?? '').replace(/\s+/g,'').toLowerCase()}
function now(){const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');return `${h<12?'오전':'오후'} ${h%12||12}:${m}`}
function setToday(){const d=new Date();document.getElementById('todayLabel').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${['일','월','화','수','목','금','토'][d.getDay()]}요일`}
function categoryOf(x){return x.category || x.main_category || x.category1 || x.section || '기타'}
function questionOf(x){return x.question || x.title || x.q || ''}
function answerOf(x){return x.answer_direct || x.answer || x.a || x.answer_summary || ''}
function renderCategories(){const box=document.getElementById('categoryButtons');box.innerHTML='';CATEGORY_ORDER.forEach(cat=>{const btn=document.createElement('button');btn.textContent=cat;if(DISABLED_CATEGORIES.has(cat)){btn.className='disabled';btn.disabled=true}else btn.onclick=()=>openCategory(cat);box.appendChild(btn)})}
function append(role,html){const root=document.getElementById('messages');const wrap=document.createElement('div');wrap.className=`bubble-wrap ${role}`;if(role==='bot'){wrap.innerHTML=`<div class="bot-face">K</div><div class="bubble-row"><div class="bubble bot">${html}</div><div class="time">${now()}</div></div>`}else{wrap.innerHTML=`<div class="bubble-row"><div class="time">${now()}</div><div class="bubble user">${html}</div></div>`}root.appendChild(wrap);root.scrollIntoView({block:'end'});document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight}
function nav(){return `<div class="nav-row"><button onclick="goHome()">처음으로</button><button onclick="historyBack()">이전으로</button></div>`}
const stack=[];
function pushState(fn){stack.push(fn)}
function historyBack(){const last=stack.pop();document.getElementById('messages').innerHTML='';document.getElementById('searchResults').innerHTML=''; if(last){last(false)}else goHome(false)}
function goHome(add=true){document.getElementById('messages').innerHTML='';document.getElementById('searchResults').innerHTML='';document.getElementById('searchInput').value='';append('bot',`<span class="mini-tag">처음 화면</span><p>초기화면으로 돌아왔습니다. 카테고리를 다시 선택하거나 검색어를 입력해 주세요.</p>`)}
function openCategory(cat,remember=true){if(remember)pushState(()=>goHome(false));append('user',esc(cat));const items=getData().filter(x=>categoryOf(x)===cat);let html=nav()+`<span class="mini-tag">${esc(cat)}</span>`;if(!items.length){html+=`<p class="empty">등록된 공개 FAQ가 없습니다. JSON 데이터의 카테고리명을 확인해 주세요.</p>`}else{html+=`<div class="card-list">`+items.map((x,i)=>`<div class="item-card" onclick="openFaq('${esc(x.id||i)}','${esc(cat)}')"><div class="k">FAQ ${i+1}</div><div class="q">${esc(questionOf(x))}</div></div>`).join('')+`</div>`}append('bot',html)}
function findItem(id,cat){const data=getData();return data.find((x,i)=>String(x.id||i)===String(id)&&categoryOf(x)===cat) || data.find((x,i)=>String(x.id||i)===String(id))}
function openFaq(id,cat){pushState(()=>openCategory(cat,false));const item=findItem(id,cat);if(!item)return;append('user',esc(questionOf(item)));append('bot',nav()+renderAnswer(item))}
function renderAnswer(x){const source=x.source_docs||x.source_doc||x.evidence_doc||x.근거문서||'';const evidence=x.evidence_summary||x.source_summary||x.근거요약||'';return `<div class="answer"><span class="mini-tag">${esc(categoryOf(x))}</span><h3>직접답</h3><p>${esc(answerOf(x)).replace(/\n/g,'<br>')}</p>${x.criteria?`<h3>적용 기준</h3><p>${esc(x.criteria).replace(/\n/g,'<br>')}</p>`:''}${x.caution?`<h3>주의사항</h3><p>${esc(x.caution).replace(/\n/g,'<br>')}</p>`:''}${x.next_action?`<h3>추천사항</h3><p>${esc(x.next_action).replace(/\n/g,'<br>')}</p>`:''}<details class="collapse-box"><summary>근거·세부정보 보기</summary><div class="collapse-content">${source?`<p><strong>근거문서</strong><br>${esc(Array.isArray(source)?source.join(', '):source)}</p>`:''}${evidence?`<p><strong>근거요약</strong><br>${esc(evidence).replace(/\n/g,'<br>')}</p>`:''}${!source&&!evidence?'표시할 근거 정보가 없습니다.': ''}</div></details></div>`}
function searchFaq(){const q=document.getElementById('searchInput').value.trim();const panel=document.getElementById('searchResults');if(!q){panel.innerHTML='';return}const nq=normalize(q);const results=getData().filter(x=>normalize([categoryOf(x),questionOf(x),answerOf(x),x.criteria,x.caution,x.next_action,x.source_docs].join(' ')).includes(nq));panel.innerHTML=`<details class="result-panel" open><summary>검색결과 ${results.length}건 접기/펼치기</summary>${results.length?`<div class="card-list" style="margin-top:8px">${results.map((x,i)=>`<div class="item-card" onclick="openFaq('${esc(x.id||i)}','${esc(categoryOf(x))}')"><div class="k">${esc(categoryOf(x))}</div><div class="q">${esc(questionOf(x))}</div></div>`).join('')}</div>`:`<p class="empty">검색결과가 없습니다. 다른 단어로 검색해 주세요.</p>`}</details>`}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchFaq()});
if(!isStandalone()){setTimeout(()=>{const b=document.getElementById('installAppBtn'); if(b) b.classList.remove('hidden')},800)}
setToday();renderCategories();append('bot',`<span class="mini-tag">안내</span><p>예시.html의 모바일 채팅형 디자인을 v10 FAQ 구조에 맞춰 이식한 베타 파일입니다.</p><p>v10 원본 HTML과 실제 JSON을 주시면 실제 데이터 기준 최종본으로 병합하겠습니다.</p>`);
</script>
</body>
</html>
