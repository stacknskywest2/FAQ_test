<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FAQ 업데이트 알림 + 웹 앱 설치 예시</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0b5f9e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="K-eco FAQ">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f4f7fb;color:#102033}
    main{max-width:720px;margin:0 auto;padding:32px 18px}
    .card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{font-size:24px;margin:0 0 12px;color:#0b5f9e}
    p{line-height:1.7}.pill{display:inline-block;border-radius:999px;background:#e8f3fb;color:#0b5f9e;padding:5px 10px;font-weight:800}
    code{background:#eef4f9;border-radius:8px;padding:2px 6px}
  </style>
</head>
<body>
  <main>
    <section class="card">
      <span class="pill">PWA 설치 가능 예시</span>
      <h1>FAQ 업데이트 알림 + 웹 앱 설치 기능</h1>
      <p>이 파일은 적용 예시입니다. 실제 배포용 <code>index.html</code> 또는 <code>faq_publish.html</code>의 <code>&lt;head&gt;</code>에 manifest와 아이콘 메타태그를 넣고, <code>&lt;/body&gt;</code> 직전에 스크립트 2개를 연결하세요.</p>
      <p>설치 조건은 <b>HTTPS 주소</b>, <b>manifest.json</b>, <b>192/512 아이콘</b>, <b>service-worker.js</b>입니다. 이번 패키지는 빈 아이콘 문제를 보완했습니다.</p>
    </section>
  </main>
  <script src="./update-notifier.js"></script>
  <script src="./install-helper.js"></script>
</body>
</html>
