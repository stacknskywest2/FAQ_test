<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수도권관제센터 FAQ</title>
<style>
:root {
  --keco-green:#73BE1E;
  --keco-blue:#1BA1C8;
  --keco-deep:#055F9B;
  --bg:#F4F8FB;
  --card:#FFFFFF;
  --text:#183247;
  --muted:#5F7485;
  --line:#D9E6EF;
  --accent:#EAF6FB;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  background:var(--bg); color:var(--text);
}
.header {
  background:linear-gradient(135deg,var(--keco-deep),var(--keco-blue));
  color:#fff; padding:20px 16px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.header .eyebrow { font-size:12px; opacity:.9; }
.header h1 { margin:6px 0 0; font-size:22px; line-height:1.3; }
.wrap { max-width:820px; margin:0 auto; padding:16px; }
.panel {
  background:var(--card); border:1px solid var(--line); border-radius:18px;
  box-shadow:0 6px 18px rgba(7,56,84,.06); overflow:hidden;
}
.panel-head {
  padding:16px 16px 10px; border-bottom:1px solid var(--line); background:#fff;
}
.panel-head h2 { margin:0; font-size:20px; line-height:1.4; }
.panel-head p { margin:6px 0 0; color:var(--muted); font-size:13px; }
.menu-list { padding:12px; display:grid; gap:10px; }
.menu-btn {
  width:100%; text-align:left; border:1px solid var(--line); background:#fff;
  border-radius:16px; padding:14px 14px; cursor:pointer; color:var(--text);
  box-shadow:0 1px 0 rgba(0,0,0,.02); font-size:15px; line-height:1.5;
}
.menu-btn:hover { border-color:var(--keco-blue); background:#F8FCFE; }
.answer-box { padding:16px; display:grid; gap:14px; }
.block {
  border:1px solid var(--line); border-radius:14px; background:#fff; overflow:hidden;
}
.block .title {
  padding:10px 12px; font-weight:700; font-size:14px; background:var(--accent);
  border-bottom:1px solid var(--line);
}
.block .body { padding:12px; white-space:pre-wrap; line-height:1.65; font-size:14px; }
.meta-list { display:grid; gap:8px; }
.meta-item { padding:10px 12px; background:#FAFCFD; border:1px solid var(--line); border-radius:12px; font-size:14px; line-height:1.6; }
.notice {
  margin-top:14px; padding:12px 14px; border-radius:14px;
  background:#FFF8E8; border:1px solid #F4DE9D; color:#6C5412; font-size:13px; line-height:1.6;
}
.nav {
  display:flex; gap:10px; margin-top:14px;
}
.nav button {
  flex:1; border:none; border-radius:14px; padding:14px 12px; font-size:15px;
  cursor:pointer; color:#fff; background:var(--keco-deep);
}
.nav button.secondary { background:#7A8F9F; }
.footer { text-align:center; color:var(--muted); font-size:12px; padding:20px 0 6px; }
.small { font-size:12px; color:var(--muted); }
.related { margin-top:8px; display:grid; gap:8px; }
.related .menu-btn { padding:12px 14px; font-size:14px; }
@media (min-width:720px) {
  .menu-list.two-col { grid-template-columns:1fr 1fr; }
}
</style>
</head>

": "공개검토", "json_key": "F.f01.005", "slug": "f-f01-005", "version_tag": "v8.0", "change_note": "195문항 유지형 질문트리 재분류"}}, {"id": "faq_F-F01-006", "parent_id": "M2_F_10_10", "depth": 4, "sort_order": 194, "type": "answer", "terminal": true, "category": {"code": "F", "name": "이용안내"}, "ui": {"label": "왜 FAQ 작업을 카테고리 단위로 나눠 관리하나요?", "question": "왜 FAQ 작업을 카테고리 단위로 나눠 관리하나요?"}, "answer": {"direct": "표준지침은 범위가 넓거나 복잡한 작업은 카테고리 단위로 분할하라고 안내합니다. 또한 프로젝트 기준 카테고리 A~F를 정해 두고, 문서 범위·문항 수·생성 범위를 명확히 하도록 요구합니다.", "basis": "카테고리 분할과 입력 범위 통제 원칙 제시 / 근거위치: 1. 기본 원칙 / 8. SOP / txt\n\n[법적 근거] 프로젝트 FAQ 작성·검수 표준지침 근거 문서 제한 원칙, 1차 안내 원칙", "next_action": "먼저 작업 카테고리와 대상 문서를 정하고, 그 다음 문항 생성·검수·버전관리 순으로 진행하세요."}, "meta": {"source_docs": ["faq_generation_sop_v1.txt"], "source_summary": "카테고리 분할과 입력 범위 통제 원칙 제시", "legal_basis": [{"law": "프로젝트 FAQ 작성·검수 표준지침", "article": "근거 문서 제한 원칙, 1차 안내 원칙", "summary": "프로젝트 FAQ 작성·검수 표준지침 근거 문서 제한 원칙, 1차 안내 원칙"}], "review_required": false, "review_reason": "0", "visibility_status": "공개검토", "json_key": "F.f01.006", "slug": "f-f01-006", "version_tag": "v8.0", "change_note": "195문항 유지형 질문트리 재분류"}}]};
const NODES = FAQ_DATA.nodes;
const nodeMap = Object.fromEntries(NODES.map(n => [n.id, n]));
let currentId = "ROOT";
let historyStack = [];

function getChildren(id) {
  return NODES.filter(n => n.parent_id === id).sort((a,b) => (a.sort_order||0) - (b.sort_order||0) || String(a.id).localeCompare(String(b.id)));
}

function breadcrumbPath(id) {
  const out = [];
  let cur = nodeMap[id];
  while (cur) {
    out.unshift(cur);
    cur = cur.parent_id ? nodeMap[cur.parent_id] : null;
  }
  return out.filter(n => n.id !== "ROOT");
}

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function nl2br(s) {
  return escapeHtml(s).replace(/\n/g, "<br>");
}

function render() {
  const body = document.getElementById("screenBody");
  const title = document.getElementById("screenTitle");
  const desc = document.getElementById("screenDesc");
  const current = nodeMap[currentId];

  if (currentId === "ROOT") {
    title.textContent = "FAQ 홈";
    desc.textContent = "카테고리를 선택해 주세요.";
    const children = getChildren("ROOT").filter(n => !["E","F"].includes((n.category && n.category.code) || ""));
    body.innerHTML = `<div class="menu-list two-col">${children.map(renderMenuButton).join("")}</div>`;
    return;
  }

  title.textContent = current.ui.question || current.ui.label || "";
  if (current.type === "answer") {
    desc.textContent = current.category ? current.category.name : "FAQ";
    body.innerHTML = renderAnswer(current);
  } else {
    const children = getChildren(currentId);
    desc.textContent = "원하는 항목을 선택해 주세요.";
    body.innerHTML = `<div class="menu-list">${children.map(renderMenuButton).join("")}</div>`;
  }
}

function renderMenuButton(item) {
  const label = item.ui.label || item.ui.question || item.id;
  return `<button class="menu-btn" onclick="openNode('${item.id}')">${escapeHtml(label)}</button>`;
}

function renderAnswer(item) {
  const a = item.answer || {};
  const m = item.meta || {};
  const legal = Array.isArray(m.legal_basis) ? m.legal_basis : [];
  const related = getChildren(item.parent_id).filter(n => n.id !== item.id).slice(0,5);

  return `
    <div class="answer-box">
      <div class="block">
        <div class="title">핵심 답변</div>
        <div class="body">${nl2br(a.direct || "")}</div>
      </div>
      <div class="block">
        <div class="title">추천사항</div>
        <div class="body">${nl2br(a.next_action || "")}</div>
      </div>

      <div class="meta-list">
        ${legal.length ? `<div class="meta-item"><strong>법적 근거</strong><br>${legal.map(x => escapeHtml([x.law, x.article].filter(Boolean).join(" "))).join("<br>")}</div>` : ""}
      </div>

      ${related.length ? `<div><div class="small">관련 질문</div><div class="related">${related.map(renderMenuButton).join("")}</div></div>` : ""}
    </div>
  `;
}

function openNode(id) {
  if (currentId) historyStack.push(currentId);
  currentId = id;
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

function goBack() {
  if (!historyStack.length) {
    currentId = "ROOT";
  } else {
    currentId = historyStack.pop();
  }
  render();
}

function goHome() {
  currentId = "ROOT";
  historyStack = [];
  render();
}

render();
</script>
